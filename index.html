<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Balasi GiS Maping</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: white;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 2px solid #00b4d8;
            box-shadow: 0 2px 15px rgba(0,180,216,0.2);
        }
        
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
            color: #90e0ef;
        }
        
        .map-container {
            width: 100%;
            height: calc(100vh - 80px);
            position: relative;
            background: #1a1a1a;
        }
        
        #map-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        
        .controls button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(15, 32, 39, 0.95);
            color: white;
            border: 1px solid #00b4d8;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,180,216,0.3);
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }
        
        .controls button:hover {
            background: #00b4d8;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,180,216,0.5);
        }
        
        .controls button:active {
            transform: scale(0.95);
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
            z-index: 999;
            background: rgba(15, 32, 39, 0.9);
            padding: 20px 50px;
            border-radius: 50px;
            border: 1px solid #00b4d8;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-right: 15px;
            border: 3px solid #00b4d8;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .footer {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: rgba(255,255,255,0.5);
            font-size: 0.7rem;
            z-index: 1000;
            background: rgba(15, 32, 39, 0.7);
            padding: 5px 12px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        
        .welcome-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            animation: fadeIn 0.5s ease-out forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        .welcome-box {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #00b4d8;
            box-shadow: 0 10px 40px rgba(0,180,216,0.3);
            max-width: 400px;
        }
        
        .welcome-box h2 {
            color: #00b4d8;
            font-size: 2rem;
            margin-bottom: 15px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .welcome-box p {
            color: #caf0f8;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .welcome-box button {
            background: #00b4d8;
            color: #0f2027;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #90e0ef;
        }
        
        .welcome-box button:hover {
            background: #0077b6;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,180,216,0.5);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗺️ Balasi GiS Maping</h1>
        <p>نظام المعلومات الجغرافية المتقدم</p>
    </div>
    
    <div class="map-container">
        <div class="loading" id="loading">⏳ جاري تحميل الخريطة...</div>
        
        <iframe 
            id="map-frame"
            src="https://geomolg.ps/L5/index.html?viewer=A3.V1"
            allow="geolocation; microphone; camera; fullscreen"
            sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals">
        </iframe>
        
        <div class="controls">
            <button onclick="refreshMap()" title="تحديث الخريطة">🔄</button>
            <button onclick="toggleFullscreen()" title="ملء الشاشة">⛶</button>
        </div>
        
        <div class="footer">
            © 2026 Balasi GiS Maping | جميع الحقوق محفوظة
        </div>
    </div>

    <script>
        const mapFrame = document.getElementById('map-frame');
        const loading = document.getElementById('loading');
        
        // إخفاء التحميل عند اكتمال تحميل الإطار
        mapFrame.onload = function() {
            loading.style.display = 'none';
        };
        
        // إذا استغرق التحميل أكثر من 12 ثانية
        setTimeout(() => {
            loading.style.display = 'none';
        }, 12000);
        
        function refreshMap() {
            loading.style.display = 'block';
            mapFrame.src = mapFrame.src;
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // منع النقر بزر الفأرة الأيمن (اختياري)
        document.addEventListener('contextmenu', function(e) {
            // e.preventDefault(); // معطل للسماح بالنسخ
        });
        
        // رسالة في الكونسول
        console.log('%c🗺️ Balasi GiS Maping', 'font-size: 20px; color: #00b4d8; font-weight: bold;');
        console.log('%cنظام المعلومات الجغرافية - نسخة 2026', 'font-size: 14px; color: #90e0ef;');
    </script>
</body>
</html>
