<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Balasi GiS Maping</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: white;
            padding: 12px 20px;
            text-align: center;
            border-bottom: 2px solid #00b4d8;
            box-shadow: 0 2px 15px rgba(0,180,216,0.2);
        }
        
        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-top: 3px;
            color: #90e0ef;
        }
        
        .map-container {
            width: 100%;
            height: calc(100vh - 70px);
            position: relative;
            background: #1a1a1a;
            overflow: hidden;
        }
        
        #map-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        
        .controls button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(15, 32, 39, 0.95);
            color: white;
            border: 1px solid #00b4d8;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,180,216,0.3);
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }
        
        .controls button:hover {
            background: #00b4d8;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,180,216,0.5);
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
            z-index: 999;
            background: rgba(15, 32, 39, 0.95);
            padding: 20px 50px;
            border-radius: 50px;
            border: 1px solid #00b4d8;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #00b4d8;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .footer {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: rgba(255,255,255,0.5);
            font-size: 0.65rem;
            z-index: 1000;
            background: rgba(15, 32, 39, 0.7);
            padding: 5px 12px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        
        .top-toolbar {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            display: flex;
            gap: 8px;
        }
        
        .top-toolbar button {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(15, 32, 39, 0.95);
            color: white;
            border: 1px solid #00b4d8;
            font-size: 18px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
        }
        
        .top-toolbar button:hover {
            background: #00b4d8;
        }
        
        /* إشعار ملء الشاشة */
        .fullscreen-hint {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,180,216,0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            z-index: 1001;
            backdrop-filter: blur(5px);
            animation: fadeOut 3s forwards;
            pointer-events: none;
        }
        
        @keyframes fadeOut {
            0%, 70% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗺️ Balasi GiS Maping</h1>
        <p>نظام المعلومات الجغرافية المتقدم</p>
    </div>
    
    <div class="map-container">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <span>⏳ جاري تحميل الخريطة...</span>
        </div>
        
        <iframe 
            id="map-frame"
            src="https://geomolg.ps/L5/index.html?viewer=A3.V1"
            allow="geolocation; microphone; camera; fullscreen"
            sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"
            allowfullscreen="true">
        </iframe>
        
        <div class="top-toolbar">
            <button onclick="refreshMap()" title="تحديث الخريطة">🔄</button>
            <button onclick="toggleFullscreen()" id="fullscreenBtn" title="ملء الشاشة">⛶</button>
        </div>
        
        <div class="controls">
            <button onclick="refreshMap()" title="تحديث">🔄</button>
            <button onclick="toggleFullscreen()" title="ملء الشاشة">⛶</button>
        </div>
        
        <div id="fullscreenHint" class="fullscreen-hint" style="display: none;">
            🖥️ تم تفعيل ملء الشاشة | اضغط ESC للخروج
        </div>
        
        <div class="footer">
            © 2026 Balasi GiS Maping | جميع الحقوق محفوظة
        </div>
    </div>

    <script>
        const mapFrame = document.getElementById('map-frame');
        const loading = document.getElementById('loading');
        const fullscreenHint = document.getElementById('fullscreenHint');
        
        // دالة تفعيل ملء الشاشة تلقائياً
        function enterFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen().then(() => {
                    fullscreenHint.style.display = 'block';
                    setTimeout(() => {
                        fullscreenHint.style.display = 'none';
                    }, 3000);
                }).catch(err => {
                    console.log('⚠️ تعذر تفعيل ملء الشاشة تلقائياً:', err);
                });
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }
        
        // دالة تبديل ملء الشاشة
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                enterFullscreen();
            } else {
                document.exitFullscreen();
                fullscreenHint.style.display = 'none';
            }
        }
        
        // مراقبة تغيير حالة ملء الشاشة
        document.addEventListener('fullscreenchange', updateFullscreenButton);
        document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
        document.addEventListener('mozfullscreenchange', updateFullscreenButton);
        document.addEventListener('MSFullscreenChange', updateFullscreenButton);
        
        function updateFullscreenButton() {
            const btn = document.getElementById('fullscreenBtn');
            if (document.fullscreenElement) {
                btn.textContent = '✕';
                btn.title = 'خروج من ملء الشاشة';
            } else {
                btn.textContent = '⛶';
                btn.title = 'ملء الشاشة';
            }
        }
        
        // إخفاء التحميل عند اكتمال تحميل الإطار
        mapFrame.onload = function() {
            loading.style.display = 'none';
            
            // تفعيل ملء الشاشة تلقائياً بعد تحميل الخريطة
            setTimeout(() => {
                enterFullscreen();
            }, 500);
        };
        
        // إذا استغرق التحميل أكثر من 12 ثانية
        setTimeout(() => {
            loading.style.display = 'none';
            // محاولة تفعيل ملء الشاشة حتى لو لم تكتمل الخريطة
            enterFullscreen();
        }, 8000);
        
        function refreshMap() {
            loading.style.display = 'flex';
            mapFrame.src = mapFrame.src;
        }
        
        // اختصار لوحة المفاتيح
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F5') {
                e.preventDefault();
                refreshMap();
            }
            if (e.key === 'F11') {
                e.preventDefault();
                toggleFullscreen();
            }
            if (e.key === 'Escape') {
                fullscreenHint.style.display = 'none';
            }
        });
        
        // محاولة تفعيل ملء الشاشة عند أول تفاعل (للمتصفحات التي تمنع التلقائي)
        let fullscreenAttempted = false;
        document.addEventListener('click', function initFullscreen() {
            if (!fullscreenAttempted && !document.fullscreenElement) {
                fullscreenAttempted = true;
                enterFullscreen();
            }
        }, { once: false });
        
        // رسالة في الكونسول
        console.log('%c🗺️ Balasi GiS Maping', 'font-size: 20px; color: #00b4d8; font-weight: bold;');
        console.log('%cنظام المعلومات الجغرافية - نسخة 2026', 'font-size: 14px; color: #90e0ef;');
        console.log('%c✅ سيتم تفعيل ملء الشاشة تلقائياً', 'font-size: 12px; color: #00ff00;');
    </script>
</body>
</html>
